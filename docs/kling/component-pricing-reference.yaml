    platform_design_notes:
      sound: "API 不收音效費，平台可自行決定"
      image: "API 不因有無首幀加費"
      image_tail: "API 不因有無尾幀加費（start_end_frame 費率相同）"


  # ----------------------------------------------------------
  # kling-v2-1
  # Endpoint: /v1/videos/image2video（不支援 text2video）
  # 計費方式: per_task
  # ----------------------------------------------------------
  kling-v2-1:
