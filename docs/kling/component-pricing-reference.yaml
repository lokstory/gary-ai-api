          duration: "5s"
          total_units: 2.0
          total_usd: "$0.28"
        - mode: std
          duration: "10s"
          total_units: 4.0
          total_usd: "$0.56"
        - mode: pro
          duration: "5s"
          total_units: 3.5
          total_usd: "$0.49"
        - mode: pro
          duration: "10s"
          total_units: 7.0
          total_usd: "$0.98"

    platform_design_notes:
      image: "image 為必填，但有無圖片不影響 API 費率"
      image_tail: "API 不因有無尾幀加費（start_end_frame 費率相同）"
      sound: "API 不收音效費"


  # ----------------------------------------------------------
  # kling-v2-master
  # Endpoints: /v1/videos/text2video, /v1/videos/image2video
  # 計費方式: per_task，無 mode 區分
  # ----------------------------------------------------------
  kling-v2-master:
    billing_type: per_task
    api_formula: "total_units = 查表固定值（by duration，無 mode 區分）"
    supported_duration_options: ["5", "10"]
    supported_modes: []   # 無 mode 欄位
    note: "不支援 start_end_frame"

    components_affecting_api_cost:
      mode: false      # 此模型無 mode 欄位
      duration: true
      sound: false
      image: false
      image_tail: false

    api_unit_reference:
      combinations:
        - duration: "5s"
          total_units: 10.0
          total_usd: "$1.40"
        - duration: "10s"
          total_units: 20.0
          total_usd: "$2.80"

    platform_design_notes:
      mode: "此模型無 mode 選項，mode 元件對此模型無作用（前台可隱藏或 disable）"
      image: "API 不因有無首幀加費"
      image_tail: "不支援尾幀（start_end_frame）"
      sound: "API 不收音效費"


