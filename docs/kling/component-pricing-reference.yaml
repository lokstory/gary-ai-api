    supported_modes: [std, pro, "4k"]

    components_affecting_api_cost:
      mode: true
      sound: true      # 影響費率（4k 例外）
      duration: true
      image: false     # 不影響費率（text/image/start_end 三種情境費率相同）
      image_tail: false

    api_unit_reference:
      combinations:
        - mode: std
          sound: "off"
          units_per_second: 0.6
          examples:
            - duration_s: 5
              total_units: 3.0
            - duration_s: 10
              total_units: 6.0

        - mode: std
          sound: "on"
          units_per_second: 0.9
          sound_delta_per_second: +0.3
          examples:
            - duration_s: 5
              total_units: 4.5
              sound_extra_units: +1.5
            - duration_s: 10
              total_units: 9.0
              sound_extra_units: +3.0

        - mode: pro
          sound: "off"
          units_per_second: 0.8
          examples:
            - duration_s: 5
              total_units: 4.0
            - duration_s: 10
              total_units: 8.0

        - mode: pro
          sound: "on"
          units_per_second: 1.2
          sound_delta_per_second: +0.4
          examples:
            - duration_s: 5
              total_units: 6.0
              sound_extra_units: +2.0
            - duration_s: 10
              total_units: 12.0
              sound_extra_units: +4.0

        - mode: "4k"
          sound: "off"
          units_per_second: 3.0
          examples:
            - duration_s: 5
              total_units: 15.0
            - duration_s: 10
              total_units: 30.0

        - mode: "4k"
          sound: "on"
          units_per_second: 3.0
          sound_delta_per_second: 0
          examples:
            - duration_s: 5
              total_units: 15.0
              sound_extra_units: 0

    platform_design_notes:
      mode: "4k 費率為 std 的 5 倍"
      sound: "std 開音效多 0.3/s，pro 多 0.4/s；4k 不加費"
      image: "API 不因有無首幀加費（text/image 費率相同）"
      image_tail: "API 不因有無尾幀加費（start_end_frame 費率與標準相同）"
      duration: "支援 3~15 秒，建議設定 per_second 點數"


  # ----------------------------------------------------------
  # kling-v2-6
  # Endpoints: /v1/videos/text2video, /v1/videos/image2video
  # 計費方式: per_task（fixed per 5s/10s）
  # ----------------------------------------------------------
  kling-v2-6:
    billing_type: per_task
    api_formula: "total_units = 查表固定值（by mode + duration + sound）"
    supported_duration_options: ["5", "10"]   # 僅支援 5s 和 10s
    supported_modes: [std, pro]

    components_affecting_api_cost:
      mode: true
      duration: true
      sound: true      # pro 模式影響費率；std 模式強制 off
      image: false
      image_tail: false

    api_unit_reference:
      note: "std 模式只能 sound=off；image/image_tail 有無不影響費率"
      combinations:
        - mode: std
          duration: "5s"
          sound: "off"
          total_units: 1.5
          total_usd: "$0.21"

        - mode: std
          duration: "10s"
          sound: "off"
          total_units: 3.0
          total_usd: "$0.42"

        - mode: pro
          duration: "5s"
          sound: "off"
          total_units: 2.5
          total_usd: "$0.35"

        - mode: pro
          duration: "10s"
          sound: "off"
          total_units: 5.0
          total_usd: "$0.70"

        - mode: pro
          duration: "5s"
          sound: "on"
          total_units: 5.0
          total_usd: "$0.70"
          sound_extra_units: +2.5   # 比 sound=off 多

        - mode: pro
          duration: "10s"
          sound: "on"
          total_units: 10.0
          total_usd: "$1.40"
          sound_extra_units: +5.0

    platform_design_notes:
      mode: "pro/5s/off 為 std/5s/off 的 1.67 倍"
      sound: "pro 開音效費率翻倍（2.5→5, 5→10）；std 不支援音效"
      image: "API 不因有無首幀加費"
      image_tail: "API 不因有無尾幀加費（start_end_frame 費率相同）"
      duration: >
        API 僅支援 5s / 10s 固定值。
        建議平台 UI 仍允許選秒數，但 per_second 點數需按 5s=X、10s=2X 邏輯換算。


